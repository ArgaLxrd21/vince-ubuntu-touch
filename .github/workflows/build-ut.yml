name: Build Ubuntu Touch (Halium 13) - Vince 4.19

on:
  workflow_dispatch: # Membikin tombol "Run workflow" manual di GitHub

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Maksimalisasi Ruang Disk Server
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 10240
        swap-size-mb: 10240
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'

    - name: Install Tooling & Dependensi Build
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git git-lfs gnupg gperf imagemagick lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 python3-pip
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Konfigurasi Git
      run: |
        git config --global user.name "ArgaLxrd21"
        git config --global user.email "arga.lxrd.21@gmail.com"

    - name: Inisialisasi Repo Halium 13
      run: |
        mkdir -p ~/halium
        cd ~/halium
        repo init -u https://github.com/Halium/android -b halium-13.0 --depth=1

    - name: Setup Local Manifest (Vince 4.19 Harta Karun)
      run: |
        mkdir -p ~/halium/.repo/local_manifests
        cat <<EOF > ~/halium/.repo/local_manifests/vince.xml
        <?xml version="1.0" encoding="UTF-8"?>
        <manifest>
          <remote name="github" fetch="https://github.com/" />
          <remote name="gitlab" fetch="https://gitlab.com/" />

          <project path="device/xiaomi/vince" name="Mirai-Miscellaneous/android_device_xiaomi_vince" remote="github" revision="lineage-20_k4.19" />
          <project path="device/xiaomi/msm8953-common" name="Mirai-Miscellaneous/android_device_xiaomi_msm8953-common" remote="github" revision="lineage-20_k4.19" />

          <project path="kernel/xiaomi/vince" name="imren0x/msm-4.19" remote="github" revision="lineage-20" />

          <project path="vendor/xiaomi/vince" name="Mirai-Miscellaneous/proprietary_vendor_xiaomi_vince" remote="github" revision="lineage-20_k4.19" />
          <project path="vendor/xiaomi/msm8953-common" name="Mirai-Miscellaneous/proprietary_vendor_xiaomi_msm8953-common" remote="github" revision="lineage-20_k4.19" />

          <project path="hardware/halium" name="Halium/android_hardware_halium" remote="github" revision="halium-13.0" />
        </manifest>
        EOF

    - name: Repo Sync (Narik Semua Bahan Sekaligus)
      run: |
        cd ~/halium
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Proses Kompilasi UT (Halium-Boot)
      run: |
        cd ~/halium
        source build/envsetup.sh
        lunch halium_vince-userdebug || lunch aosp_vince-userdebug || breakfast vince
        make -j$(nproc --all) halium-boot

    - name: Upload Hasil Build (Artifacts)
      uses: actions/upload-artifact@v4
      with:
        name: Ubuntu-Touch-Vince-4.19
        path: |
          ~/halium/out/target/product/vince/halium-boot.img
          ~/halium/out/target/product/vince/system.img
          
