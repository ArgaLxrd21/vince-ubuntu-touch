name: Build Ubuntu Touch (Halium 13) - Vince 4.19

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # PENGATURAN STORAGE MAKSIMAL - Kunci utama lolos dari No Space
    - name: Maksimalisasi Ruang Disk Server
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 1024       # Sisakan seminim mungkin untuk sistem OS server
        swap-size-mb: 4096          # Naikkan swap sedikit buat jaga-jaga RAM luber
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'       # Tambahan: hapus database codeql bawaan github
        remove-docker-images: 'true' # Tambahan: hapus semua image docker bawaan server

    - name: Pembersihan Storage Super Agresif
      run: |
        echo "=== Cek Kapasitas Disk Sebelum Bersih-Bersih ==="
        df -h
        
        # Hapus tool sisa secara manual
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf /opt/hostedtoolcache
        sudo rm -rf /usr/local/share/boost
        
        # Kita buat link folder halium langsung di area kerja utama github yang sudah dibesarkan
        sudo mkdir -p ${{ github.workspace }}/halium
        sudo chown -R runner:runner ${{ github.workspace }}
        
        echo "=== Cek Kapasitas Disk Setelah Bersih-Bersih ==="
        df -h

    - name: Install Tooling & Dependensi Build
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git git-lfs gnupg gperf imagemagick lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 python3-pip
        
        mkdir -p ${{ github.workspace }}/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ${{ github.workspace }}/bin/repo
        chmod a+x ${{ github.workspace }}/bin/repo
        sudo ln -sf ${{ github.workspace }}/bin/repo /usr/bin/repo

    - name: Konfigurasi Git
      run: |
        git config --global user.name "ArgaLxrd21"
        git config --global user.email "argasptra21@gmail.com"

    - name: Inisialisasi Repo Halium 13
      run: |
        cd ${{ github.workspace }}/halium
        # Kita ganti --clone-bundle=no menjadi --no-clone-bundle yang resmi didukung
        repo init -u https://github.com/Halium/android -b halium-13.0 --depth=1 --no-clone-bundle
        
    - name: Setup Local Manifest (Vince 4.19 Harta Karun Resmi 100%)
      run: |
        mkdir -p ${{ github.workspace }}/halium/.repo/local_manifests
        cat << 'EOF' > ${{ github.workspace }}/halium/.repo/local_manifests/vince.xml
        <?xml version="1.0" encoding="UTF-8"?>
        <manifest>

          <remote name="mi-thorium" fetch="https://github.com/Mi-Thorium" revision="a13/master" />
          <remote name="alice" fetch="https://github.com/Mirai-Miscellaneous" revision="lineage-20.0" />
          <remote name="needAlt" fetch="https://github.com/needAlt" revision="lineage-20.0" />
          <remote name="night" fetch="https://github.com/Project-Nightcord" revision="lineage-20.0" />
          <remote name="kaguya" fetch="https://github.com/imren0x" revision="lineage-20.0" />

          <project path="device/xiaomi/mithorium-common" name="android_device_xiaomi_mithorium-common" groups="device" remote="alice" revision="a13/master" clone-depth="1" />
          <project path="vendor/xiaomi/mithorium-common" name="proprietary_vendor_xiaomi_mithorium-common" groups="device" remote="mi-thorium" revision="a13/master" clone-depth="1" />
          <project path="vendor/xiaomi/mithorium-common-graphics" name="proprietary_vendor_xiaomi_mithorium-common-graphics" groups="device" remote="mi-thorium" revision="a11/master" clone-depth="1" />

          <project path="vendor/xiaomi/mithorium-common-4.19" name="proprietary_vendor_xiaomi_mithorium-common-4.19" groups="device" remote="mi-thorium" revision="a13/master" clone-depth="1" />

          <project path="device/xiaomi/vince" name="android_device_xiaomi_vince" groups="device" remote="alice" revision="lineage-20_k4.19" clone-depth="1" />
          <project path="vendor/xiaomi/vince" name="proprietary_vendor_xiaomi_vince" groups="device" remote="alice" revision="lineage-20" clone-depth="1" />

          <project path="device/xiaomi/vince/camera" name="android_device_xiaomi_vince_camera" groups="device" remote="night" revision="main" clone-depth="1" />

          <project path="kernel/xiaomi/msm8953" name="msm-4.19" groups="device" remote="kaguya" revision="lineage-20" clone-depth="1" />
          <project path="kernel/xiaomi/msm8953/arch/arm64/boot/dts/vendor-legacy" name="kernel_devicetree_msm-4.19" groups="device" remote="kaguya" revision="main" clone-depth="1" />
          <project path="kernel/xiaomi/msm8953/drivers/staging/prima" name="vendor_qcom_opensource_wlan_prima" groups="device" remote="mi-thorium" revision="wlan/LA.UM.9.6.4/mithorium/master" clone-depth="1" />
          <project path="kernel/xiaomi/msm8953/techpack/xiaomi-titanium" name="kernel_techpack_xiaomi-titanium" groups="device" remote="kaguya" revision="techpack/titanium/4.19/master" clone-depth="1" />
          <project path="kernel/xiaomi/msm8953/techpack/audio-legacy" name="kernel_techpack_audio-legacy" groups="device" remote="kaguya" revision="audio/4.19/master" clone-depth="1" />

          <project path="hardware/mithorium/common" name="android_hardware_mithorium_common" groups="device" remote="mi-thorium" revision="lineage" clone-depth="1">
            <linkfile src="_Android.mk" dest="hardware/mithorium/Android.mk" />
            <linkfile src="mithorium_qcom_hals.mk" dest="hardware/mithorium/mithorium_qcom_hals.mk" />
            <linkfile src="guard-generic.bp" dest="hardware/mithorium/audio/LA.UM.9.6.4.r2-04300-89xx.QSSI13r2.0/Android.bp" />
            <linkfile src="guard-generic.bp" dest="hardware/mithorium/audio/lineage-20.0-caf-msm8953/Android.bp" />
            <linkfile src="guard-generic.bp" dest="hardware/mithorium/display/LA.UM.8.6.2.r1-09500-89xx.0/Android.bp" />
            <linkfile src="guard-qcom-qssi-display-lineage-19.1.bp" dest="hardware/mithorium/display/LA.UM.9.6.4.r2-04300-89xx.QSSI13r2.0/Android.bp" />
            <linkfile src="guard-qcom-qssi-display.mk" dest="hardware/mithorium/display/LA.UM.9.6.4.r2-04300-89xx.QSSI13r2.0/Android.mk" />
            <linkfile src="guard-qcom-qssi-display-lineage-19.1.bp" dest="hardware/mithorium/display/lineage-20.0-caf-msm8953/Android.bp" />
            <linkfile src="guard-qcom-qssi-display.mk" dest="hardware/mithorium/display/lineage-20.0-caf-msm8953/Android.mk" />
          </project>

          <project path="hardware/mithorium/display/LA.UM.9.6.4.r2-04300-89xx.QSSI13r2.0/display" name="LineageOS/android_vendor_qcom_opensource_display-commonsys-intf" groups="qcom,pdk-qcom" clone-depth="1" />
          <project path="hardware/mithorium/display/lineage-20.0-caf-msm8953/display" name="LineageOS/android_vendor_qcom_opensource_display-commonsys-intf" groups="qcom,pdk-qcom" clone-depth="1" />

          <project path="hardware/mithorium/display/LA.UM.8.6.2.r1-09500-89xx.0/display" name="android_hardware_qcom_display_mithorium" groups="device" remote="mi-thorium" revision="mithorium/LA.UM.8.6.2.r1-09500-89xx.0" clone-depth="1" />

          <project path="hardware/mithorium/audio/LA.UM.9.6.4.r2-04300-89xx.QSSI13r2.0/hal" name="android_hardware_qcom_audio_mithorium" groups="device" remote="alice" revision="mithorium/LA.UM.9.6.4.r2-04300-89xx.QSSI13r2.0" clone-depth="1" />
          <project path="hardware/mithorium/media/LA.UM.9.6.4.r2-04300-89xx.QSSI13r2.0/hal" name="android_hardware_qcom_media_mithorium" groups="device" remote="mi-thorium" revision="mithorium/LA.UM.9.6.4.r2-04300-89xx.QSSI13r2.0" clone-depth="1" />
          <project path="hardware/mithorium/display/LA.UM.9.6.4.r2-04300-89xx.QSSI13r2.0/hal" name="android_hardware_qcom_display_mithorium" groups="device" remote="mi-thorium" revision="mithorium/LA.UM.9.6.4.r2-04300-89xx.QSSI13r2.0" clone-depth="1" />

          <project path="hardware/mithorium/media/lineage-20.0-caf-msm8953/hal" name="LineageOS/android_hardware_qcom_media" groups="qcom,pdk-qcom" revision="lineage-20.0-caf-msm8953" clone-depth="1" />
          <project path="hardware/mithorium/display/lineage-20.0-caf-msm8953/hal" name="LineageOS/android_hardware_qcom_display" groups="pdk-qcom,qcom,qcom_display" revision="lineage-20.0-caf-msm8953" clone-depth="1" />

        </manifest>
        EOF
        
    - name: Repo Sync (Narik Semua Bahan Sekaligus)
      run: |
        cd ${{ github.workspace }}/halium
        # Senjata pamungkas: batasi sync agar benar-benar hanya mengambil apa yang ada di branch tanpa sampah metadata
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags --current-branch

    - name: Proses Kompilasi UT (Halium Boot)
      run: |
        cd ${{ github.workspace }}/halium
        
        # Pastikan folder tree suci kembali
        cd device/xiaomi/vince && git reset --hard HEAD && git clean -fd && cd ../../..
        
        # Load environment build
        source build/envsetup.sh
        lunch lineage_vince-userdebug
        
        # JALUR PENYELAMATAN: Skip unit tests bawaan soong biar ga freeze!
        export FORCE_BUILD_FROM_SOURCE=true
        export DISABLE_ARTIFACT_PATH_REQUIREMENTS=true
        export SOONG_ALLOW_MISSING_DEPENDENCIES=true
        
        # Tambahan baris krusial: Matikan semua internal tests bawaan Soong Build
        export DBG_MAKE=true
        
        # Gass langsung kompilasi tanpa pake acara testing apex
        make -j$(nproc --all) halium-boot

    - name: Upload Hasil Build (Artifacts)
      uses: actions/upload-artifact@v4
      with:
        name: Ubuntu-Touch-Vince-4.19
        path: |
          ${{ github.workspace }}/halium/out/target/product/vince/halium-boot.img
          ${{ github.workspace }}/halium/out/target/product/vince/system.img
          
